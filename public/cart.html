<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | LUXE</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="index.html">LUXE.</a></div>
            
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="category.html?category=Men">Men</a></li>
                <li><a href="category.html?category=Women">Women</a></li>
            </ul>
            <div class="nav-icons">
                 <a href="cart.html"><i class='bx bxs-shopping-bag'></i> <span class="cart-count">0</span></a>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="cart-page-container">
        
        <!-- LEFT: CART ITEMS -->
        <div class="cart-left">
            <h2>Shopping Cart</h2>
            <div id="cartItemsContainer">
                <!-- JS will inject items here -->
                <p>Your cart is empty.</p>
            </div>
        </div>

        <!-- RIGHT: CHECKOUT FORM -->
        <div class="cart-right">
            <div class="summary-box">
                <h3>Shipping Details</h3>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="address" placeholder="123 Fashion St" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="city" placeholder="New York" required>
                        </div>
                        <div class="form-group">
                            <label>Postal Code</label>
                            <input type="text" id="postalCode" placeholder="10001" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Country</label>
                        <input type="text" id="country" placeholder="USA" required>
                    </div>

                    <hr>
                    
                    <div class="totals">
                        <div class="total-row">
                            <span>Subtotal</span>
                            <span id="subTotal">$0.00</span>
                        </div>
                        <div class="total-row">
                            <span>Shipping</span>
                            <span>$0.00</span>
                        </div>
                        <div class="total-row final">
                            <span>Total</span>
                            <span id="finalTotal">$0.00</span>
                        </div>
                    </div>

                    <button type="submit" class="checkout-btn">Place Order</button>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/cart.js"></script>
</body>
</html>
