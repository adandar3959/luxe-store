<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Sales Management</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/admin-dashboard.css"> <link rel="stylesheet" href="css/profile.css"> </head>
<body>

    <div class="sidebar">
        <div class="logo">
            <i class='bx bxs-pie-chart-alt-2'></i> 
            Sales<br>MANAGEMENT
        </div>
        <a href="admin-dashboard.html" class="menu-item"><i class='bx bxs-dashboard'></i> Dashboard</a>
        <a href="profile.html" class="menu-item active"><i class='bx bx-user'></i> Profile</a>
        <a href="admin-products.html" class="menu-item"><i class='bx bx-shopping-bag'></i> Products</a>
        <a href="admin-orders.html" class="menu-item"><i class='bx bx-cart'></i> Orders</a>
        <a href="admin-customers.html" class="menu-item"><i class='bx bx-group'></i> Customers</a>
        <a href="admin-employees.html" class="menu-item"><i class='bx bx-id-card'></i> Employees</a>
        <a href="admin-finance.html" class="menu-item"><i class='bx bx-wallet'></i> Finance</a>
        <a href="customer-orders.html" class="menu-item"><i class='bx bx-list-ul'></i> My Orders</a>
        <a href="categories.html" class="menu-item active"><i class='bx bx-category'></i> Categories</a>
        <a href="index.html" class="menu-item"><i class='bx bx-store'></i> View Store</a>

    </div>

    <div class="main-content">
        <div class="page-header">
            <h2>Account Settings</h2>
            <p>Manage your personal information and security.</p>
        </div>

        <div class="profile-grid">
            <div class="profile-card user-card">
                <div class="profile-header">
                    <div class="avatar-large" id="profileAvatar">A</div>
                    <h3 id="profileName">Loading...</h3>
                    <span class="role-badge" id="profileRole">Admin</span>
                </div>
                <div class="card-body">
                    <div class="info-row">
                        <i class='bx bx-envelope'></i>
                        <span id="profileEmail">loading@example.com</span>
                    </div>
                    <div class="info-row">
                        <i class='bx bx-calendar'></i>
                        <span>Joined: Oct 2025</span>
                    </div>
                    <button class="btn-logout" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="profile-card form-card">
                <div class="card-header">
                    <h3>Edit Details</h3>
                    <button class="btn-edit" onclick="enableEdit()" id="editBtn"><i class='bx bx-edit-alt'></i> Edit</button>
                </div>
                <form id="profileForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="inputName" disabled>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="inputEmail" disabled>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="text" id="inputPhone" placeholder="+1 234 567 890" disabled>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="inputAddress" placeholder="New York, USA" disabled>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>New Password (Optional)</label>
                        <input type="password" id="inputPassword" placeholder="Leave blank to keep current" disabled>
                    </div>

                    <div class="form-actions hidden" id="saveActions">
                        <button type="button" class="btn-cancel" onclick="cancelEdit()">Cancel</button>
                        <button type="submit" class="btn-save">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/profile.js"></script>
    <script src="js/sidebar-access.js"></script>
</body>
</html>
