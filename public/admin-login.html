<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Signup | Sales Management</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            background: #151521; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            font-family: sans-serif;
        }
        .login-box { 
            background: #1e1e2d; 
            padding: 40px; 
            border-radius: 12px; 
            width: 400px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #2b2b40; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 5px; 
            outline: none;
            box-sizing: border-box; /* Ensures padding doesn't widen input */
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #695CFE; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background: #5a4edc; }

        /* Links Box */
        .bottom-links {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        .bottom-links p { font-size: 13px; color: #aaa; margin: 5px 0; }
        .bottom-links a { color: #695CFE; text-decoration: none; font-weight: bold; }
        .bottom-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 style="margin-bottom:20px;">Admin Signup</h2>
        <p style="color:#aaa; font-size:13px; margin-bottom:20px;">Create a new administrative account.</p>
        
        <form id="signupForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <input type="password" id="adminKey" placeholder="Admin Secret Key" required>
            
            <button type="submit">Create Account</button>
        </form>
        
        <div class="bottom-links">
            <p>
                Already have an account? <a href="login.html">Login Here</a>
            </p>
        </div>
        
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. Get Values
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const adminKey = document.getElementById('adminKey').value;

            // 2. Prepare Data (Only for Signup)
            const url = '/api/users';
            const body = { name, email, password, adminKey };

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (res.ok) {
                    // Check if role is actually admin (based on the key provided)
                    if(data.role === 'admin') {
                        // Save token and info
                        localStorage.setItem('userInfo', JSON.stringify(data));
                        // Redirect to dashboard
                        alert("Admin Account Created Successfully!");
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        // This happens if the Secret Key was wrong
                        alert("Account created as CUSTOMER. Check your Admin Key.");
                        window.location.href = 'index.html';
                    }
                } else {
                    alert(data.message || "Signup failed");
                }
            } catch (error) {
                console.error(error);
                alert("Server error. Check if backend is running.");
            }
        });
    </script>
</body>
</html>
