<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE Admin | Newsletter</title>
    
    <link rel="stylesheet" href="css/admin-style.css"> 
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        /* Container Fix - Prevents content from being hidden behind sidebar */
        .admin-container {
            margin-left: 260px; 
            width: calc(100% - 260px);
            min-height: 100vh;
            background: #161623; 
            padding: 40px;
            box-sizing: border-box;
        }

        /* Modern Card Styling */
        .card {
            background: #1e1e2e; 
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2d2d3f;
        }

        .main-header h1 {
            color: #fff;
            margin-bottom: 40px;
            font-size: 28px;
            font-weight: 600;
        }

        .card h3 {
            color: #fff;
            margin-bottom: 25px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card h3 i { color: #7367f0; }

        /* Form Controls */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #b0b0b0;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 15px;
            background: #2b2b3d;
            border: 1px solid #3f3f5a;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .btn-primary {
            background: #7367f0;
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        /* Table Styling */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .admin-table th {
            text-align: left;
            padding: 18px;
            background: rgba(115, 103, 240, 0.05);
            color: #7367f0;
            font-size: 13px;
            text-transform: uppercase;
        }

        .admin-table td {
            padding: 18px;
            border-bottom: 1px solid #2b2b3d;
            color: #cfcfdf;
            font-size: 15px;
        }

        /* Sidebar Item States */
        .menu-item.active {
            background: rgba(115, 103, 240, 0.1);
            color: #7367f0;
            border-right: 4px solid #7367f0;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <main class="admin-main">
            <header class="main-header">
                <h1>Newsletter Management</h1>
            </header>

            <section class="broadcast-section card">
                <h3><i class='bx bx-send'></i> Send Mass Email</h3>
                <form id="broadcastForm">
                    <div class="form-group">
                        <label>Email Subject</label>
                        <input type="text" id="emailSubject" placeholder="e.g. New Autumn Collection is Here!" required>
                    </div>
                    <div class="form-group">
                        <label>Message Content (HTML allowed)</label>
                        <textarea id="emailMessage" rows="6" placeholder="Write your announcement here..." required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class='bx bx-paper-plane'></i> Send to All Subscribers
                    </button>
                </form>
            </section>

            <section class="subscriber-section card">
                <h3><i class='bx bx-list-ul'></i> Subscribers List</h3>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Email Address</th>
                            <th>Date Joined</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="subscriberList">
                        <tr><td colspan="3" style="text-align:center;">Loading subscribers...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="js/admin-newsletter.js"></script>
    <script src="js/admin-role.js"></script>
</body>
</html>
