<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter | Admin</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <style>
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--muted); font-size: 12px; font-weight: 500; margin-bottom: 8px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px 14px;
            background: var(--bg-dark); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
        .btn-send {
            background: var(--accent); color: white; border: none;
            padding: 12px 28px; border-radius: 9px; cursor: pointer;
            font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 8px;
            transition: 0.2s; box-shadow: 0 4px 14px var(--accent-glow);
        }
        .btn-send:hover { background: #5a4edc; }
        .btn-delete {
            background: transparent; border: 1px solid var(--border);
            color: var(--red); width: 32px; height: 32px; border-radius: 7px;
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .btn-delete:hover { background: var(--red); color: white; border-color: var(--red); }
        .stats-row { display: flex; gap: 18px; margin-bottom: 28px; }
        .stats-row .card { flex: 1; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <i class='bx bxs-pie-chart-alt-2'></i>
            Sales<br>MANAGEMENT
        </div>
        <a href="admin-dashboard.html" class="menu-item"><i class='bx bxs-dashboard'></i> Dashboard</a>
        <a href="profile.html" class="menu-item"><i class='bx bx-user'></i> Profile</a>
        <a href="admin-products.html" class="menu-item"><i class='bx bx-shopping-bag'></i> Products</a>
        <a href="admin-orders.html" class="menu-item"><i class='bx bx-cart'></i> Orders</a>
        <a href="admin-customers.html" class="menu-item"><i class='bx bx-group'></i> Customers</a>
        <a href="admin-employees.html" class="menu-item"><i class='bx bx-id-card'></i> Employees</a>
        <a href="admin-finance.html" class="menu-item"><i class='bx bx-wallet'></i> Finance</a>
        <a href="categories.html" class="menu-item"><i class='bx bx-category'></i> Categories</a>
        <a href="admin-newsletter.html" class="menu-item active"><i class='bx bx-envelope'></i> Newsletter</a>
        <a href="index.html" class="menu-item"><i class='bx bx-store'></i> View Store</a>
        <a href="#" class="menu-item logout-btn"><i class='bx bx-log-out'></i> Logout</a>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h2 class="section-title">Newsletter</h2>
            <div class="admin-profile">
                <div class="admin-img" id="adminAvatar">A</div>
            </div>
        </div>

        <div class="stats-row">
            <div class="card">
                <div class="icon-box" style="background:rgba(105,92,254,0.12); color:var(--accent);">
                    <i class='bx bx-group'></i>
                </div>
                <h3 id="subCount">0</h3>
                <p>Total Subscribers</p>
            </div>
        </div>

        <div class="card" style="margin-bottom: 24px;">
            <h3 style="font-size:16px; font-weight:600; margin-bottom:20px;">
                <i class='bx bx-send' style="color:var(--accent); margin-right:8px;"></i>Send Mass Email
            </h3>
            <form id="broadcastForm">
                <div class="form-group">
                    <label>Email Subject</label>
                    <input type="text" id="emailSubject" placeholder="e.g. New Autumn Collection is Here!" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="emailMessage" rows="5" placeholder="Write your message here..." required></textarea>
                </div>
                <button type="submit" class="btn-send">
                    <i class='bx bx-paper-plane'></i> Send to All Subscribers
                </button>
            </form>
        </div>

        <div class="card">
            <h3 style="font-size:16px; font-weight:600; margin-bottom:4px;">
                <i class='bx bx-list-ul' style="color:var(--accent); margin-right:8px;"></i>Subscribers
            </h3>
            <table class="main-table">
                <thead>
                    <tr>
                        <th>Email Address</th>
                        <th>Date Joined</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="subscriberList">
                    <tr><td colspan="3" style="text-align:center; color:var(--muted);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/admin-newsletter.js"></script>
    <script src="js/sidebar-access.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userInfo = JSON.parse(localStorage.getItem('userInfo'));
            if (userInfo) document.getElementById('adminAvatar').innerText = userInfo.name.charAt(0).toUpperCase();
        });
    </script>
</body>
</html>
