<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LUXE Admin | Newsletter</title>
    <link rel="stylesheet" href="css/admin-style.css"> <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        /* Newsletter Specific Adjustments */
        .card {
            background: #1e1e2e; /* Dark purple/black from your UI */
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .broadcast-section h3, .subscriber-section h3 {
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #a0a0a0;
            margin-bottom: 8px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #2b2b3d;
            border: 1px solid #3f3f5a;
            border-radius: 5px;
            color: #fff;
            font-family: inherit;
        }

        .btn-primary {
            background: #7367f0; /* Default admin accent color */
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #5e50ee;
        }

        /* Table styling to match your Customers page */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            color: #e0e0e0;
        }

        .admin-table th {
            text-align: left;
            padding: 15px;
            background: #252538;
            color: #7367f0;
        }

        .admin-table td {
            padding: 15px;
            border-bottom: 1px solid #2b2b3d;
        }

        .btn-delete {
            background: #ea5455;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><i class='bx bxs-pie-chart-alt-2'></i> Sales<br>MANAGEMENT</div>
        <a href="admin-dashboard.html" class="menu-item"><i class='bx bxs-dashboard'></i> Dashboard</a>
        <a href="profile.html" class="menu-item"><i class='bx bx-user'></i> Profile</a>
        <a href="admin-products.html" class="menu-item"><i class='bx bx-shopping-bag'></i> Products</a>
        <a href="admin-orders.html" class="menu-item"><i class='bx bx-cart'></i> Orders</a>
        <a href="admin-customers.html" class="menu-item"><i class='bx bx-group'></i> Customers</a>
        <a href="admin-employees.html" class="menu-item"><i class='bx bx-id-card'></i> Employees</a>
        <a href="admin-finance.html" class="menu-item active"><i class='bx bx-wallet'></i> Finance</a>
        <a href="categories.html" class="menu-item active"><i class='bx bx-category'></i> Categories</a>
        <a href="admin-newsletter.html" class="menu-item"><i class='bx bx-envelope'></i> Newsletter</a>
        <a href="index.html" class="menu-item"><i class='bx bx-store'></i> View Store</a>
    </div>

    <div class="admin-container">
        <main class="admin-main">
            <header class="main-header">
                <h1>Newsletter Management</h1>
            </header>

            <section class="broadcast-section card">
                <h3><i class='bx bx-send'></i> Send Mass Email</h3>
                <form id="broadcastForm">
                    <div class="form-group">
                        <label>Email Subject</label>
                        <input type="text" id="emailSubject" placeholder="e.g. New Autumn Collection is Here!" required>
                    </div>
                    <div class="form-group">
                        <label>Message Content (HTML allowed)</label>
                        <textarea id="emailMessage" rows="6" placeholder="Write your announcement here..." required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Send to All Subscribers</button>
                </form>
            </section>

            <section class="subscriber-section card">
                <h3><i class='bx bx-group'></i> Subscribers List</h3>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Email Address</th>
                            <th>Date Joined</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="subscriberList">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="js/admin-newsletter.js"></script>
</body>
</html>
