<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Sales Management</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <link rel="stylesheet" href="css/profile.css">
    <style>
        
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            background: #1e1e2d; 
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        .orders-table th, .orders-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #2b2b40;
            color: #fff;
        }
        .orders-table th {
            background: #2b2b40;
            font-weight: 600;
        }
        
        
        .status { padding: 5px 10px; border-radius: 5px; font-size: 0.85rem; }
        .status.pending { background: #ffad46; color: #000; }
        .status.processing { background: #46a4ff; color: #fff; }
        .status.delivered { background: #00c853; color: #fff; }
        .status.cancelled { background: #ff4646; color: #fff; }

        
        .btn-cancel-order {
            background: #ff4646;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-cancel-order:hover { background: #d32f2f; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <i class='bx bxs-pie-chart-alt-2'></i> 
            Sales<br>MANAGEMENT
        </div>
        <a href="admin-dashboard.html" class="menu-item"><i class='bx bxs-dashboard'></i> Dashboard</a>
        <a href="profile.html" class="menu-item"><i class='bx bx-user'></i> Profile</a>
        <a href="admin-products.html" class="menu-item"><i class='bx bx-shopping-bag'></i> Products</a>
        <a href="admin-orders.html" class="menu-item"><i class='bx bx-cart'></i> Orders</a>
        <a href="customer-orders.html" class="menu-item active"><i class='bx bx-list-ul'></i> My Orders</a>
        <a href="categories.html" class="menu-item active"><i class='bx bx-category'></i> Categories</a>

        <a href="index.html" class="menu-item"><i class='bx bx-store'></i> View Store</a>
        
        <a href="#" class="menu-item logout-btn"><i class='bx bx-log-out'></i> Logout</a>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h2>My Order History</h2>
            <p>Track your current orders and view past purchases.</p>
        </div>

        <div class="orders-container">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    </tbody>
            </table>
            <p id="noOrdersMsg" style="color: #888; margin-top: 20px; display: none;">No orders found.</p>
        </div>
    </div>

    <script src="js/sidebar-access.js"></script>
    <script src="js/customer-orders.js"></script>
</body>
</html>
